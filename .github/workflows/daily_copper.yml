name: Daily Copper Data

on:
  schedule:
    # 北京时间 10:00 = UTC 02:00，工作日执行
    - cron: '0 2 * * 1-5'
  workflow_dispatch:   # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests pandas openpyxl supabase yfinance python-dotenv

      - name: 抓取 COMEX 铜价 + CFTC 持仓
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scraper.py --once

      - name: 抓取 CME COMEX 铜库存
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 fetch_cme_comex.py

      - name: 抓取 LME + SHFE 库存（每周一执行）
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # 周一才跑LME和SHFE更新（避免重复）
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pip install akshare
            python3 import_lme.py
          else
            echo "非周一，跳过LME/SHFE更新"
          fi
