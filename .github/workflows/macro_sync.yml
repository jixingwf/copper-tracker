name: 宏观数据同步

on:
  schedule:
    # 每天 UTC 0:00 运行一次，即北京时间早上 8:00
    # cron 时间是 UTC 时区，写的时候要自己换算成北京时间 - 8 小时
    - cron: "0 0 * * *"
  # 允许在 GitHub 网页上手动点击 "Run workflow" 触发，方便调试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行同步脚本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python akshare_macro_sync.py
